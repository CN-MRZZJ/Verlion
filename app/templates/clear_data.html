{% extends "layout.html" %}
{% block title %}清除数据{% endblock %}
{% block content %}

<style>
  .clear-shell { max-width: 980px; }
  .clear-header { margin-bottom: 14px; }
  .clear-title { margin: 0; font-size: 22px; font-weight: 600; }
  .clear-muted { color: #777; font-size: 12px; line-height: 1.7; }
  .clear-card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 14px;
  }
  .clear-warning {
    margin-bottom: 14px;
    padding: 10px 12px;
    border: 1px solid #f2d6a2;
    border-radius: 6px;
    background: #fff8e8;
    color: #8a5a00;
  }
  .clear-table-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px 14px;
  }
  .clear-code {
    display: inline-block;
    min-width: 74px;
    padding: 0 8px;
    border-radius: 4px;
    background: #f2f4f7;
    font-family: Consolas, monospace;
    color: #333;
  }
  @media (max-width: 760px) {
    .clear-table-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="clear-shell">
  <div class="clear-header">
    <h2 class="clear-title">清除数据</h2>
    <div class="clear-muted">该页面只用于维护和重新初始化数据。导入数据请返回“初始化与导入”。</div>
  </div>

  <section class="clear-card">
    <div class="clear-warning">
      清除操作不可恢复。执行前请确认已经备份数据库，并只选择本次需要清理的数据表。
    </div>

    <form class="layui-form js-ajax-form" method="post" action="/api/v1/maintenance/clear-data" data-ajax="true" id="clear-data-form" autocomplete="off">
      <div class="layui-form-item">
        <label class="layui-form-label">选择表</label>
        <div class="layui-input-block">
          <div class="clear-table-grid">
            {% for key, label in clear_table_options.items() %}
              <div>
                <input type="checkbox" name="tables" value="{{ key }}" title="{{ label }} ({{ key }})" lay-skin="primary">
              </div>
            {% endfor %}
          </div>
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">确认口令</label>
        <div class="layui-input-inline">
          <input type="text" name="confirm_text" placeholder="请输入 DELETE" class="layui-input" />
        </div>
        <div class="layui-form-mid layui-word-aux">必须输入大写 DELETE</div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">校验码</label>
        <div class="layui-input-inline">
          <input type="text" name="confirm_code" placeholder="请输入 CLEAR-N" class="layui-input" />
        </div>
        <div class="layui-form-mid layui-word-aux">当前应填：<span class="clear-code" id="clear-code-hint">CLEAR-0</span></div>
      </div>

      <div class="layui-form-item">
        <div class="layui-input-block">
          <input type="checkbox" name="acknowledged" value="1" title="我已确认这是不可逆操作" lay-skin="primary">
        </div>
      </div>

      <div class="layui-form-item">
        <div class="layui-input-block">
          <button type="submit" class="layui-btn layui-btn-danger">执行清除</button>
          <a class="layui-btn layui-btn-primary" href="/pages/import-center">返回数据导入</a>
        </div>
      </div>
    </form>
  </section>
</div>

{% endblock %}
