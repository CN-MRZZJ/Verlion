{% extends "layout.html" %}
{% block title %}数据导出{% endblock %}
{% block content %}

<div class="layui-row layui-col-space15" id="export-center-app">
  <div class="layui-col-md12">
    <div class="layui-card">
      <div class="layui-card-header">快速导出</div>
      <div class="layui-card-body">
        <div class="layui-row layui-col-space10">
          {% for key, label in data_views %}
            <div class="layui-col-md3 layui-col-sm4 layui-col-xs6">
              <a class="layui-btn layui-btn-primary layui-btn-fluid" href="/export/data/{{ key }}" target="_blank">{{ label }} CSV</a>
            </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>

  <div class="layui-col-md12">
    <div class="layui-card">
      <div class="layui-card-header">条件导出</div>
      <div class="layui-card-body">
        <form class="layui-form" id="export-filter-form" autocomplete="off">
          <div class="layui-row layui-col-space10">
            <div class="layui-col-md2">
              <label class="layui-form-label">数据类型</label>
              <div class="layui-input-block">
                <select name="view" id="exp-view">
                  {% for key, label in data_views %}
                    <option value="{{ key }}">{{ label }} ({{ key }})</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="layui-col-md3">
              <label class="layui-form-label">关键词</label>
              <div class="layui-input-block">
                <input type="text" name="keyword" class="layui-input" placeholder="姓名/项目/编号" />
              </div>
            </div>
            <div class="layui-col-md2">
              <label class="layui-form-label">部门</label>
              <div class="layui-input-block">
                <select name="department_name">
                  <option value="">全部</option>
                  {% for name in department_names %}
                    <option value="{{ name }}">{{ name }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="layui-col-md1">
              <label class="layui-form-label">类别</label>
              <div class="layui-input-block">
                <select name="category">
                  <option value="">全部</option>
                  <option value="competitive">竞技</option>
                  <option value="fun">趣味</option>
                </select>
              </div>
            </div>
            <div class="layui-col-md1">
              <label class="layui-form-label">策略</label>
              <div class="layui-input-block">
                <select name="scoring_strategy">
                  <option value="">全部</option>
                  <option value="time">time</option>
                  <option value="length">length</option>
                  <option value="count">count</option>
                  <option value="count_miss">count_miss</option>
                </select>
              </div>
            </div>
            <div class="layui-col-md1">
              <label class="layui-form-label">性别</label>
              <div class="layui-input-block">
                <select name="gender">
                  <option value="">全部</option>
                  <option value="male">男</option>
                  <option value="female">女</option>
                  <option value="mixed">混合</option>
                </select>
              </div>
            </div>
            <div class="layui-col-md1">
              <label class="layui-form-label">组别</label>
              <div class="layui-input-block">
                <select name="age_group">
                  <option value="">全部</option>
                  <option value="ALL">不分组</option>
                  <option value="A">甲组</option>
                  <option value="B">乙组</option>
                  <option value="C">丙组</option>
                </select>
              </div>
            </div>
            <div class="layui-col-md1">
              <div class="layui-input-block" style="margin-top:30px;">
                <button type="button" class="layui-btn" id="btn-export-filter">导出</button>
              </div>
            </div>
          </div>
        </form>
        <p class="layui-word-aux" style="margin-top:8px;">导出格式为 CSV，字段与“数据库查看”页面当前数据视图一致。</p>
      </div>
    </div>
  </div>
</div>

<script>
window.addEventListener('load', function(){
  var app = document.getElementById('export-center-app');
  if(!app) return;
  var form = document.getElementById('export-filter-form');
  var btn = document.getElementById('btn-export-filter');

  function exportWithFilter(){
    if(!form) return;
    var fd = new FormData(form);
    var view = String(fd.get('view') || '').trim() || 'events';
    var qs = new URLSearchParams({
      keyword: String(fd.get('keyword') || '').trim(),
      department_name: String(fd.get('department_name') || '').trim(),
      gender: String(fd.get('gender') || '').trim(),
      age_group: String(fd.get('age_group') || '').trim(),
      category: String(fd.get('category') || '').trim(),
      scoring_strategy: String(fd.get('scoring_strategy') || '').trim()
    });
    window.open('/export/data/' + encodeURIComponent(view) + '?' + qs.toString(), '_blank');
  }

  if(btn){
    btn.addEventListener('click', exportWithFilter);
  }

  if(window.layui && layui.use){
    layui.use(['form'], function(){
      if(layui.form) layui.form.render('select');
    });
  }
});
</script>

{% endblock %}
